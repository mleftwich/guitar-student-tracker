<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#12161f"/>
  <!-- Guitar body -->
  <ellipse cx="32" cy="44" rx="13" ry="11" fill="none" stroke="#E8A98A" stroke-width="2.5"/>
  <ellipse cx="32" cy="44" rx="8" ry="7" fill="none" stroke="#E8A98A" stroke-width="1.2" opacity="0.4"/>
  <!-- Waist -->
  <path d="M25 38 Q20 33 24 27" fill="none" stroke="#E8A98A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M39 38 Q44 33 40 27" fill="none" stroke="#E8A98A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="30" y="14" width="4" height="16" rx="2" fill="#E8A98A"/>
  <!-- Headstock -->
  <rect x="28" y="10" width="8" height="6" rx="2" fill="#E8A98A"/>
  <!-- Sound hole -->
  <circle cx="32" cy="44" r="3" fill="#12161f" stroke="#E8A98A" stroke-width="1"/>
  <!-- Fret lines -->
  <line x1="30" y1="19" x2="34" y2="19" stroke="#12161f" stroke-width="1"/>
  <line x1="30" y1="23" x2="34" y2="23" stroke="#12161f" stroke-width="1"/>
  <line x1="30" y1="27" x2="34" y2="27" stroke="#12161f" stroke-width="1"/>
</svg>
